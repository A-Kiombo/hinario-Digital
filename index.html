<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hinário Digital - CBA</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2ecc71">

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/hinario-Digital/sw.js', { scope: '/hinario-Digital/' })
            .then(reg => console.log("App pronta para uso offline!", reg))
            .catch(err => console.log("Erro no Service Worker:", err));
        });
      }
    </script>

    <style>
        /* MANTIVE TODO O TEU ESTILO CSS AQUI (Omitido para encurtar a mensagem, mas mantém o teu original) */
        :root { --bg-geral: #f4f7f6; --bg-card: #ffffff; --text-main: #2c3e50; --header-bg: #2c3e50; --accent: #3498db; --border: rgba(0,0,0,0.05); }
        body.dark-mode { --bg-geral: #000000; --bg-card: #121212; --text-main: #ffffff; --header-bg: #1a1a1a; --border: rgba(255,255,255,0.1); }
        /* ... Teus estilos continuam aqui ... */
        body { font-family: 'Merriweather', serif; font-weight: 500; color: #1a1a1a; font-size: 19px; line-height: 1.7; margin: 0; background-color: var(--bg-geral); transition: background 0.3s, color 0.3s; }
        header { background-color: var(--header-bg); color: white; padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .hino-numero { background: var(--accent); color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 12px; font-size: 0.75rem; font-weight: bold; }
        .btn-float { position: fixed; top: 50%; transform: translateY(-50%); background-color: rgba(255, 255, 255, 0.2); backdrop-filter: blur(5px); border: 1px solid rgba(0, 0, 0, 0.1); color: #2ecc71; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 9999 !important; opacity: 0.5; pointer-events: auto; }
        .btn-float:nth-child(1) { left: 5px; } .btn-float:nth-child(2) { right: 5px; }
        .dropdown-content { display: none; position: absolute; right: 0; top: 50px; background-color: white; min-width: 160px; box-shadow: 0px 8px 16px rgba(0,0,0,0.2); border-radius: 8px; z-index: 1000; }
        .show { display: block !important; }
        .refrao-destaque { font-style: italic; font-weight: bold; background-color: rgba(0, 0, 0, 0.05); padding: 10px; border-left: 4px solid #2ecc71; margin: 15px 0; border-radius: 4px; text-align: center; }
    </style>
</head>

<body>
    <div id="tela-inicial" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
        <div style="position: absolute; top: 0; width: 100%; height: 15px; background: #2ecc71;"></div> 
        <div style="position: absolute; bottom: 0; width: 100%; height: 15px; background: #e74c3c;"></div> 
        <img src="CBA.JPEG" alt="Logo" style="width: 120px; margin-bottom: 20px;">
        <h1 style="color: #2c3e50; margin-bottom: 30px;">Hinário Digital</h1>
        <div style="display: flex; flex-direction: column; gap: 15px; width: 80%;">
            <button class="btn-home" onclick="escolherIdioma('kikongo')" style="background: #2ecc71; color: white; padding: 15px; border:none; border-radius:10px; font-weight:bold;">Hinos Kikongo</button>
            <button class="btn-home" onclick="escolherIdioma('portugues')" style="background: #e74c3c; color: white; padding: 15px; border:none; border-radius:10px; font-weight:bold;">Hinos Português</button>
        </div>
        <p style="margin-top: 40px; font-size: 0.8rem; color: #7f8c8d;">Igreja Baptista do Papelão - Uíge</p>
    </div>

    <div id="app-conteudo" style="display: none;">
        <header>
            <div class="header-content" style="display:flex; align-items:center; gap:10px;">
                <img src="CBA.JPEG" alt="Logo" style="height:40px; border-radius:5px;">
                <h2 style="margin:0; font-size: 1.2rem;">Hinário Digital</h2>
            </div>
            <div class="menu-container" style="position:relative;">
                <button class="menu-btn" onclick="toggleMenu()" style="background:none; border:none; color:white; font-size:28px;">⋮</button>
                <div id="myDropdown" class="dropdown-content">
                    <a href="#" onclick="mostrarTecladoNumeros()" style="padding:12px; display:block; text-decoration:none; color:#333;">🔢 Escolher por Número</a>
                    <a href="#" onclick="mostrarListaHinos()" style="padding:12px; display:block; text-decoration:none; color:#333;">📜 Lista de Hinos</a>
                    <a href="#" onclick="voltarParaInicio()" style="padding:12px; display:block; text-decoration:none; color:#e74c3c; font-weight:bold;">🔄 Trocar Hinário</a>
                    <a href="#" onclick="toggleDarkMode()" style="padding:12px; display:block; text-decoration:none; color:#333;">🌓 Modo Escuro/Claro</a>
                    <a href="#" onclick="verFavoritos()" style="padding:12px; display:block; text-decoration:none; color:#333;">⭐ Meus Favoritos</a>
                    <a href="#" onclick="abrirSobre()" style="padding:12px; display:block; text-decoration:none; color:#333;">ℹ️ Sobre</a>
                </div>
            </div>
        </header>

        <div id="tela-numeros">
            <h3 style="text-align: center; padding: 15px;">Escolha o Número</h3>
            <div id="grid-container" class="grade-numeros" style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; padding:20px;"></div>
        </div>

        <div id="lista-container" style="display: none;">
            <div class="search-container" style="padding: 10px;">
                <input type="text" id="busca" placeholder="Buscar por número ou título..." onkeyup="filtrarHinos()" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc;">
            </div>
            <ul id="lista-hinos" style="list-style:none; padding:0; margin:0;"></ul>
        </div>
    </div>

    <div id="detalhe-hino" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-card); z-index: 2000; overflow-y: auto;">
        <div style="display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee;">
            <button class="btn-voltar" onclick="fecharHino()" style="padding:10px; background:#2c3e50; color:white; border:none; border-radius:5px;">Voltar</button>
            <div class="leitura-header-actions" style="margin-left: auto; display: flex; gap: 10px; align-items: center;">
                <button class="btn-zoom" onclick="alterarZoom(-2)" style="width:35px; height:35px;">A-</button>
                <button class="btn-zoom" onclick="alterarZoom(2)" style="width:35px; height:35px;">A+</button>
                <button id="fav-btn-icon" class="btn-fav" onclick="toggleFavorito()" style="background:none; border:none; font-size:28px; color:#ccc;">★</button>
            </div>
        </div>
        <div class="nav-buttons">
            <button class="btn-float" onclick="mudarHino(-1)">‹</button>
            <button class="btn-float" onclick="mudarHino(1)">›</button>
        </div>
        <h2 id="titulo-hino" style="text-align:center; margin-top: 20px;"></h2>
        <div id="letra-hino" style="padding: 20px; text-align: center; line-height: 1.6;"></div>
    </div>

    <script>
        // --- VARIÁVEIS E LÓGICA CORRIGIDAS ---
        let hinosData = [];
        let idiomaAtual = '';
        let hinoAtualId = null;
        let favoritos = JSON.parse(localStorage.getItem('meusFavoritos')) || [];

        window.escolherIdioma = async function(idioma) {
            idiomaAtual = idioma;
            const ficheiro = (idioma === 'kikongo') ? 'hinos.json' : 'hinosportugues.json';
            try {
                const response = await fetch(ficheiro);
                hinosData = await response.json();
                document.getElementById('tela-inicial').style.display = 'none';
                document.getElementById('app-conteudo').style.display = 'block';
                mostrarTecladoNumeros();
            } catch (error) {
                alert("Erro ao carregar hinos. Verifique a internet.");
            }
        };

        window.mostrarTecladoNumeros = function() {
            document.getElementById('tela-numeros').style.display = 'block';
            document.getElementById('lista-container').style.display = 'none';
            const grid = document.getElementById('grid-container');
            grid.innerHTML = hinosData.map(hino => `<div class="num-item" style="background:var(--bg-card); border:1px solid var(--border); padding:15px; text-align:center; border-radius:8px; font-weight:bold;" onclick="abrirHino(${hino.id})">${hino.id}</div>`).join('');
        };

        window.mostrarListaHinos = function() {
            document.getElementById('tela-numeros').style.display = 'none';
            document.getElementById('lista-container').style.display = 'block';
            renderizarLista(hinosData);
        };

        function renderizarLista(lista) {
            const ul = document.getElementById('lista-hinos');
            ul.innerHTML = lista.map(hino => `
                <li class="hino-item" style="display:flex; align-items:center; padding:10px; border-bottom:1px solid var(--border);" onclick="abrirHino(${hino.id})">
                    <span class="hino-numero">${hino.id}</span>
                    <span class="hino-titulo">${hino.titulo}</span>
                </li>
            `).join('');
        }

        window.abrirHino = function(id) {
            hinoAtualId = id;
            const hino = hinosData.find(h => h.id == id);
            if (!hino) return;
            document.getElementById('titulo-hino').innerText = hino.id + " - " + hino.titulo;
            let letraFormatada = hino.letra.replace(/\n/g, '<br>');
            letraFormatada = letraFormatada.replace(/(Ref:|Refrão:)([\s\S]*?)(?=<br><br>|$)/g, '<div class="refrao-destaque"><strong>$1</strong><em>$2</em></div>');
            document.getElementById('letra-hino').innerHTML = letraFormatada;
            document.getElementById('fav-btn-icon').style.color = favoritos.includes(id) ? "gold" : "#ccc";
            document.getElementById('detalhe-hino').style.display = 'block';
            document.querySelector('header').style.display = 'none';
            document.getElementById('detalhe-hino').scrollTo(0,0);
        };

        window.fecharHino = function() {
            document.getElementById('detalhe-hino').style.display = 'none';
            document.querySelector('header').style.display = 'flex';
        };

        window.toggleMenu = function() { document.getElementById("myDropdown").classList.toggle("show"); };
        window.voltarParaInicio = function() { location.reload(); };
        window.toggleDarkMode = function() { document.body.classList.toggle('dark-mode'); };

        window.mudarHino = function(direcao) {
            const indexAtual = hinosData.findIndex(h => h.id == hinoAtualId);
            const novoIndex = indexAtual + direcao;
            if (novoIndex >= 0 && novoIndex < hinosData.length) {
                abrirHino(hinosData[novoIndex].id);
            }
        };

        function alterarZoom(delta) {
            const el = document.getElementById('letra-hino');
            let size = parseFloat(window.getComputedStyle(el).fontSize);
            el.style.fontSize = (size + delta) + "px";
        }
    </script>
</body>
</html>
